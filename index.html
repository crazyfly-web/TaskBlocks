<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TaskBlocks — 我的工作方塊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e5e7eb; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; min-height:100vh; }
  #app { position:relative; width:100%; max-width:1440px; min-height:900px; margin:0 auto; box-shadow:0 20px 60px rgba(15,23,42,0.25); overflow:hidden; }
  input, button { font-family:inherit; }
  button { cursor:pointer; border:none; background:none; }
  .block { position:absolute; left:0; width:80px; height:80px; cursor:pointer;
           transition:bottom 0.4s cubic-bezier(0.32,1.4,0.55,1), opacity 0.25s, transform 0.25s; }
  .block.removing { opacity:0; transform:scale(0.6); pointer-events:none; }
  @media (prefers-reduced-motion: reduce) { .block { transition:none; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   TaskBlocks — vanilla JS + Supabase
   資料流:v_board_tasks (讀) → tasks.update status='done' (完成,軟刪除)
   ============================================================ */

const SUPABASE_URL = 'https://wmynsxppwnmopifmnrsv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_S6D7llADQ-s_stOjofNXrg_pttmFXHj';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------- 全域狀態(資料驅動渲染) ---------- */
const state = {
  session: null,
  profile: null,          // 登入者 profile(名字、主題偏好)
  theme: 'pro',           // 'pro' | 'cute'
  tasks: [],              // 來自 v_board_tasks
  selectedId: null,
  filterUrgency: 'all',   // 'all' | 'red' | 'yellow' | 'green'
  filterAssignee: null,   // profile id | null
  search: '',
  showAdd: false,
  loading: true,
  authMsg: '',
};

const urgencyMeta = {
  red:    { color:'#ef4444', bg:'#fef2f2', label:'緊急', cuteBg:'#fca5a5', cuteText:'#7f1d1d' },
  yellow: { color:'#eab308', bg:'#fefce8', label:'中',   cuteBg:'#fde047', cuteText:'#713f12' },
  green:  { color:'#22c55e', bg:'#f0fdf4', label:'低',   cuteBg:'#86efac', cuteText:'#14532d' },
};

const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- 截止時間格式化:timestamptz → 今天/明天/週X ---------- */
function fmtDue(ts) {
  if (!ts) return '未定';
  const d = new Date(ts), now = new Date();
  const day0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((dd - day0) / 86400000);
  const hm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  const wk = ['週日','週一','週二','週三','週四','週五','週六'][d.getDay()];
  if (diff < 0)  return `已逾期 ${d.getMonth()+1}/${d.getDate()}`;
  if (diff === 0) return `今天 ${hm}`;
  if (diff === 1) return `明天 ${hm}`;
  if (diff < 7)  return `${wk} ${hm}`;
  return `${d.getMonth()+1}/${d.getDate()} ${hm}`;
}

/* ---------- 資料存取 ---------- */
async function loadTasks() {
  const { data, error } = await db.from('v_board_tasks').select('*');
  if (error) { console.error('讀取任務失敗:', error.message); return; }
  state.tasks = data || [];
  render();
}

async function loadProfile() {
  if (!state.session) return;
  const { data } = await db.from('profiles').select('*').eq('id', state.session.user.id).single();
  if (data) { state.profile = data; state.theme = data.theme || 'pro'; }
}

async function completeTask(id) {
  // 先做前端動畫,再寫資料庫(樂觀更新)
  animateRemoval(id);
  state.tasks = state.tasks.filter(t => t.id !== id);
  state.selectedId = null;
  renderModal();
  updateCounts();
  const { error } = await db.from('tasks').update({ status: 'done' }).eq('id', id);
  if (error) { alert('完成任務失敗:' + error.message); await loadTasks(); }
}

async function addTask(payload) {
  const uid = state.session.user.id;
  const { error } = await db.from('tasks').insert({
    ...payload, assignee_id: uid, created_by: uid,
  });
  if (error) { alert('新增失敗:' + error.message); return; }
  state.showAdd = false;
  await loadTasks();
}

async function toggleTheme() {
  state.theme = state.theme === 'pro' ? 'cute' : 'pro';
  render();
  if (state.session) {
    await db.from('profiles').update({ theme: state.theme }).eq('id', state.session.user.id);
  }
}

/* ---------- 篩選後的可見任務 ---------- */
function visibleTasks() {
  return state.tasks.filter(t =>
    (state.filterUrgency === 'all' || t.urgency === state.filterUrgency) &&
    (!state.filterAssignee || t.assignee_id === state.filterAssignee) &&
    (!state.search || (t.title||'').includes(state.search) || (t.code||'').includes(state.search))
  );
}
function columns() {
  const v = visibleTasks();
  return [0,1,2].map(c => v.filter((_, i) => i % 3 === c));
}
function counts() {
  const v = visibleTasks();
  return {
    total: v.length,
    red: v.filter(t=>t.urgency==='red').length,
    yellow: v.filter(t=>t.urgency==='yellow').length,
    green: v.filter(t=>t.urgency==='green').length,
  };
}
function assigneeList() {
  const seen = new Map();
  state.tasks.forEach(t => {
    if (t.assignee_id && !seen.has(t.assignee_id))
      seen.set(t.assignee_id, { id:t.assignee_id, name:t.name||'未指派', initials:t.initials||'?', color:t.avatarColor||'#94a3b8' });
  });
  return [...seen.values()];
}

/* ---------- 完成動畫:方塊消除 + 上方方塊重力下落 ---------- */
function animateRemoval(id) {
  const el = document.querySelector(`.block[data-id="${id}"]`);
  if (el) el.classList.add('removing');
  // 重算剩餘方塊位置,transition 會自動播放下落動畫
  const remain = visibleTasks().filter(t => t.id !== id);
  [0,1,2].forEach(c => {
    remain.filter((_, i) => i % 3 === c).forEach((t, i) => {
      const b = document.querySelector(`.block[data-id="${t.id}"]`);
      if (b) b.style.bottom = (i * 82) + 'px';
    });
  });
  setTimeout(() => { if (el) el.remove(); }, 300);
}
function updateCounts() {
  const c = counts();
  const set = (sel, v) => { const e = document.querySelector(sel); if (e) e.textContent = v; };
  set('[data-count=total]', c.total); set('[data-count=red]', c.red);
  set('[data-count=yellow]', c.yellow); set('[data-count=green]', c.green);
}

/* ============================================================
   畫面渲染
   ============================================================ */
function render() {
  const app = document.getElementById('app');
  if (state.loading) { app.innerHTML = viewLoading(); return; }
  if (!state.session) { app.innerHTML = viewLogin(); bindLogin(); return; }
  app.innerHTML = (state.theme === 'pro' ? viewPro() : viewCute()) + viewModal() + viewAddModal();
  bindBoard();
}
function renderModal() {
  document.querySelectorAll('.tb-modal').forEach(e => e.remove());
  document.getElementById('app').insertAdjacentHTML('beforeend', viewModal() + viewAddModal());
  bindModal();
}

function viewLoading() {
  return `<div style="min-height:900px;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#64748b;font-size:14px;">載入中…</div>`;
}

/* ---------- 登入畫面(Magic Link) ---------- */
function viewLogin() {
  return `
  <div style="min-height:900px;display:flex;align-items:center;justify-content:center;background:#0f172a;">
    <div style="width:360px;background:#ffffff;padding:40px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="width:24px;height:24px;background:#0f172a;"></div>
        <div style="font-size:20px;font-weight:700;color:#0f172a;">TaskBlocks</div>
      </div>
      <div style="font-size:13px;color:#64748b;margin-bottom:28px;">輸入 Email,我們會寄一條登入連結給你。</div>
      <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email"
        style="width:100%;padding:12px;border:1px solid #cbd5e1;font-size:14px;margin-bottom:12px;background:#f8fafc;">
      <button id="login-btn"
        style="width:100%;padding:12px;background:#0f172a;color:#fff;font-size:14px;font-weight:700;">寄送登入連結</button>
      <div id="login-msg" style="font-size:12px;color:#16a34a;margin-top:14px;min-height:18px;">${esc(state.authMsg)}</div>
    </div>
  </div>`;
}
function bindLogin() {
  const btn = document.getElementById('login-btn');
  btn.onclick = async () => {
    const email = document.getElementById('login-email').value.trim();
    if (!email) return;
    btn.disabled = true; btn.textContent = '寄送中…';
    const { error } = await db.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: location.origin + location.pathname },
    });
    document.getElementById('login-msg').textContent =
      error ? ('寄送失敗:' + error.message) : '已寄出!請到信箱點擊登入連結。';
    btn.disabled = false; btn.textContent = '寄送登入連結';
  };
}

/* ---------- 方塊(專業) ---------- */
function proBlock(t, i) {
  const m = urgencyMeta[t.urgency] || urgencyMeta.green;
  return `
  <div class="block" data-id="${t.id}" style="bottom:${i*82}px;background:linear-gradient(145deg,#1e293b,#0f172a);border:1px solid #334155;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
    <div style="width:9px;height:9px;background:${m.color};"></div>
    <div style="font-size:11px;font-weight:700;color:#e2e8f0;text-align:center;padding:0 4px;line-height:1.2;">${esc(t.code)}</div>
  </div>`;
}
/* ---------- 方塊(可愛小怪物) ---------- */
function cuteBlock(t, i) {
  const m = urgencyMeta[t.urgency] || urgencyMeta.green;
  const c = m.color;
  return `
  <div class="block" data-id="${t.id}" style="bottom:${i*82}px;background:${c};border:3px solid #1f2937;border-radius:20px;">
    <div style="position:absolute;left:-7px;top:30px;width:11px;height:7px;background:${c};border:3px solid #1f2937;border-radius:6px;"></div>
    <div style="position:absolute;right:-7px;top:30px;width:11px;height:7px;background:${c};border:3px solid #1f2937;border-radius:6px;"></div>
    <div style="position:absolute;left:16px;bottom:-8px;width:9px;height:11px;background:${c};border:3px solid #1f2937;border-radius:5px;"></div>
    <div style="position:absolute;right:16px;bottom:-8px;width:9px;height:11px;background:${c};border:3px solid #1f2937;border-radius:5px;"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:22px;">
      <div style="width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid #1f2937;display:flex;align-items:center;justify-content:center;"><div style="width:5px;height:5px;border-radius:50%;background:#1f2937;"></div></div>
      <div style="width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid #1f2937;display:flex;align-items:center;justify-content:center;"><div style="width:5px;height:5px;border-radius:50%;background:#1f2937;"></div></div>
    </div>
    <div style="font-size:9px;font-weight:700;color:#1f2937;text-align:center;margin-top:5px;">${esc(t.code)}</div>
  </div>`;
}

function colHeight() {
  const maxLen = Math.max(3, ...columns().map(c => c.length));
  return maxLen * 82 + 2;
}

/* ---------- 專業模式 ---------- */
function viewPro() {
  const c = counts(), cols = columns(), h = colHeight();
  const uBtn = (key, label, color) => {
    const on = state.filterUrgency === key;
    return key === 'all'
      ? `<button data-uf="all" style="padding:6px 12px;background:${on?'#1e293b':'transparent'};border:1px solid ${on?'#1e293b':'#334155'};color:#fff;font-size:12px;font-weight:600;">全部</button>`
      : `<button data-uf="${key}" style="padding:6px 12px;border:1px solid #334155;background:${on?'#1e293b':'transparent'};color:${color};font-size:12px;display:flex;align-items:center;gap:6px;"><span style="width:6px;height:6px;background:${color};"></span>${label}</button>`;
  };
  const people = assigneeList().map(p => `
    <button data-af="${p.id}" style="display:flex;align-items:center;gap:10px;color:${state.filterAssignee===p.id?'#fff':'#cbd5e1'};font-size:13px;text-align:left;">
      <div style="width:20px;height:20px;background:${esc(p.color)};color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;">${esc(p.initials)}</div>${esc(p.name)}
    </button>`).join('');
  return `
  <div style="display:flex;width:100%;min-height:900px;background:#f8fafc;">
    <div style="width:240px;flex-shrink:0;background:#0f172a;display:flex;flex-direction:column;padding:28px 20px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:36px;">
        <div style="width:28px;height:28px;background:#fff;flex-shrink:0;"></div>
        <div style="color:#fff;font-size:18px;font-weight:700;letter-spacing:0.02em;">TaskBlocks</div>
      </div>
      <div style="color:#64748b;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">導覽</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:32px;">
        <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#1e293b;color:#fff;font-size:14px;font-weight:600;"><div style="width:16px;height:16px;background:#fff;"></div>看板</div>
        ${['日曆','團隊','報表','設定'].map((n,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;color:#94a3b8;font-size:14px;"><div style="width:16px;height:16px;${i===1?'border-radius:50%;':''}background:#64748b;"></div>${n}</div>`).join('')}
      </div>
      <div style="color:#64748b;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">依緊急程度</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;">
        ${uBtn('all')}${uBtn('red','緊急','#ef4444')}${uBtn('yellow','中','#eab308')}${uBtn('green','低','#22c55e')}
      </div>
      <div style="color:#64748b;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">依負責人</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${people || '<div style="color:#475569;font-size:12px;">尚無承辦人</div>'}
        ${state.filterAssignee ? '<button data-af="" style="color:#64748b;font-size:12px;text-align:left;">✕ 清除篩選</button>' : ''}
      </div>
      <button id="signout" style="margin-top:auto;color:#64748b;font-size:12px;text-align:left;padding:8px 0;">登出</button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;">
      <div style="height:84px;flex-shrink:0;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 32px;">
        <div>
          <div style="font-size:22px;font-weight:700;color:#0f172a;">我的工作方塊</div>
          <div style="font-size:13px;color:#64748b;margin-top:2px;">承辦人:${esc(state.profile?.full_name||'')}　·　共 <span data-count="total">${c.total}</span> 個進行中任務</div>
        </div>
        <div style="display:flex;align-items:center;gap:20px;">
          <input id="search" value="${esc(state.search)}" placeholder="搜尋任務..." style="width:220px;padding:9px 12px;border:1px solid #cbd5e1;font-size:13px;color:#0f172a;background:#f8fafc;">
          <button id="add-btn" style="padding:9px 16px;background:#0f172a;color:#fff;font-size:13px;font-weight:700;">＋ 新增任務</button>
          <div id="theme-toggle" style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <span style="font-size:12px;color:#64748b;font-weight:600;">專業模式</span>
            <div style="width:52px;height:28px;background:#0f172a;border:1px solid #0f172a;position:relative;">
              <div style="width:20px;height:20px;background:#fff;position:absolute;top:3px;left:3px;"></div>
            </div>
          </div>
        </div>
      </div>
      <div style="flex:1;padding:32px;display:flex;gap:24px;flex-wrap:wrap;">
        <div style="background:#fff;border:1px solid #e2e8f0;padding:24px;flex-shrink:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:24px;">
            <div style="font-size:16px;font-weight:700;color:#0f172a;">今日任務容器</div>
            <div style="display:flex;gap:14px;font-size:12px;color:#64748b;">
              <span><span style="color:#ef4444;font-weight:700;">●</span> 緊急 <span data-count="red">${c.red}</span></span>
              <span><span style="color:#eab308;font-weight:700;">●</span> 中 <span data-count="yellow">${c.yellow}</span></span>
              <span><span style="color:#22c55e;font-weight:700;">●</span> 低 <span data-count="green">${c.green}</span></span>
            </div>
          </div>
          <div style="border-left:6px solid #0f172a;border-right:6px solid #0f172a;border-bottom:6px solid #0f172a;background:#e2e8f0;box-shadow:inset 0 -14px 24px rgba(15,23,42,0.08);padding:20px;display:flex;gap:16px;">
            ${cols.map(col=>`<div style="position:relative;width:80px;height:${h}px;">${col.map((t,i)=>proBlock(t,i)).join('')}</div>`).join('')}
          </div>
          ${c.total===0?'<div style="text-align:center;color:#94a3b8;font-size:13px;margin-top:16px;">容器空空的 — 按「＋ 新增任務」放入第一個方塊。</div>':''}
        </div>
        <div style="background:#fff;border:1px solid #e2e8f0;padding:24px;width:280px;flex-shrink:0;align-self:flex-start;">
          <div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:12px;">操作說明</div>
          <div style="font-size:12px;color:#64748b;line-height:1.8;">點擊任一方塊查看任務詳情。<br>按下「完成」後,該方塊會消除,上層方塊將依重力往下掉落,補上空位。</div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ---------- 可愛模式 ---------- */
function viewCute() {
  const c = counts(), cols = columns(), h = colHeight();
  const pill = (key, label, bg, tx) => {
    const on = state.filterUrgency === key;
    return key === 'all'
      ? `<button data-uf="all" style="padding:6px 14px;background:${on?'#1f2937':'#fef9c3'};color:${on?'#fef08a':'#78350f'};font-size:12px;font-weight:700;border-radius:999px;border:2px solid #1f2937;">全部</button>`
      : `<button data-uf="${key}" style="padding:6px 14px;background:${bg};color:${tx};font-size:12px;font-weight:700;border-radius:999px;border:2px solid #1f2937;${on?'box-shadow:0 0 0 3px #1f2937;':''}">${label}</button>`;
  };
  const people = assigneeList().map(p => `
    <button data-af="${p.id}" style="display:flex;align-items:center;gap:10px;color:#1f2937;font-size:13px;font-weight:${state.filterAssignee===p.id?'800':'600'};text-align:left;">
      <div style="width:22px;height:22px;border-radius:50%;background:${esc(p.color)};color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #1f2937;">${esc(p.initials)}</div>${esc(p.name)}
    </button>`).join('');
  return `
  <div style="display:flex;width:100%;min-height:900px;background:#fffbeb;font-family:'Fredoka',Helvetica,Arial,sans-serif;">
    <div style="width:240px;flex-shrink:0;background:#fef08a;display:flex;flex-direction:column;padding:28px 20px;border-right:4px solid #1f2937;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:32px;">
        <div style="width:34px;height:34px;border-radius:60% 40% 55% 45%/45% 55% 40% 60%;background:#fca5a5;border:3px solid #1f2937;"></div>
        <div style="color:#1f2937;font-size:19px;font-weight:700;">TaskBlocks</div>
      </div>
      <div style="color:#78350f;font-size:11px;font-weight:700;letter-spacing:0.06em;margin-bottom:12px;">導覽</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:28px;">
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:3px solid #1f2937;border-radius:16px;color:#1f2937;font-size:14px;font-weight:600;"><div style="width:16px;height:16px;border-radius:50%;background:#fca5a5;"></div>看板</div>
        ${[['日曆','#a7f3d0'],['團隊','#93c5fd'],['報表','#fca5a5'],['設定','#a7f3d0']].map(([n,cl])=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;color:#78350f;font-size:14px;font-weight:600;"><div style="width:16px;height:16px;border-radius:50%;background:${cl};"></div>${n}</div>`).join('')}
      </div>
      <div style="color:#78350f;font-size:11px;font-weight:700;letter-spacing:0.06em;margin-bottom:12px;">依緊急程度</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;">
        ${pill('all')}${pill('red','緊急','#fca5a5','#7f1d1d')}${pill('yellow','中','#fde047','#713f12')}${pill('green','低','#86efac','#14532d')}
      </div>
      <div style="color:#78350f;font-size:11px;font-weight:700;letter-spacing:0.06em;margin-bottom:12px;">依負責人</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${people || '<div style="color:#a16207;font-size:12px;">尚無承辦人</div>'}
        ${state.filterAssignee ? '<button data-af="" style="color:#78350f;font-size:12px;text-align:left;font-weight:700;">✕ 清除篩選</button>' : ''}
      </div>
      <button id="signout" style="margin-top:auto;color:#78350f;font-size:12px;font-weight:700;text-align:left;padding:8px 0;">登出</button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;">
      <div style="height:88px;flex-shrink:0;background:#fffbeb;border-bottom:4px solid #1f2937;display:flex;align-items:center;justify-content:space-between;padding:0 32px;">
        <div>
          <div style="font-size:24px;font-weight:700;color:#1f2937;">我的工作方塊</div>
          <div style="font-size:13px;color:#78350f;font-weight:600;margin-top:2px;">承辦人:${esc(state.profile?.full_name||'')}　·　共 <span data-count="total">${c.total}</span> 隻小怪物在等你</div>
        </div>
        <div style="display:flex;align-items:center;gap:20px;">
          <input id="search" value="${esc(state.search)}" placeholder="搜尋任務..." style="width:220px;padding:9px 14px;border:3px solid #1f2937;border-radius:999px;font-size:13px;color:#1f2937;background:#fff;">
          <button id="add-btn" style="padding:9px 18px;background:#86efac;color:#14532d;font-size:13px;font-weight:700;border-radius:999px;border:3px solid #1f2937;">＋ 放一隻進去</button>
          <div id="theme-toggle" style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <span style="font-size:12px;color:#78350f;font-weight:700;">可愛模式</span>
            <div style="width:56px;height:30px;background:#fca5a5;border:3px solid #1f2937;border-radius:999px;position:relative;">
              <div style="width:22px;height:22px;background:#fff;border:2px solid #1f2937;border-radius:50%;position:absolute;top:1px;right:1px;"></div>
            </div>
          </div>
        </div>
      </div>
      <div style="flex:1;padding:32px;display:flex;gap:24px;flex-wrap:wrap;">
        <div style="background:#fff;border:4px dashed #1f2937;border-radius:32px;padding:24px;flex-shrink:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:24px;">
            <div style="font-size:16px;font-weight:700;color:#1f2937;">小怪物工作罐</div>
            <div style="display:flex;gap:10px;font-size:12px;color:#78350f;font-weight:700;">
              <span style="background:#fca5a5;padding:4px 10px;border-radius:999px;border:2px solid #1f2937;">緊急 <span data-count="red">${c.red}</span></span>
              <span style="background:#fde047;padding:4px 10px;border-radius:999px;border:2px solid #1f2937;">中 <span data-count="yellow">${c.yellow}</span></span>
              <span style="background:#86efac;padding:4px 10px;border-radius:999px;border:2px solid #1f2937;">低 <span data-count="green">${c.green}</span></span>
            </div>
          </div>
          <div style="border-left:8px solid #1f2937;border-right:8px solid #1f2937;border-bottom:8px solid #1f2937;border-radius:0 0 26px 26px;background:#fef3c7;padding:20px;display:flex;gap:10px;">
            ${cols.map(col=>`<div style="position:relative;width:80px;height:${h}px;">${col.map((t,i)=>cuteBlock(t,i)).join('')}</div>`).join('')}
          </div>
          ${c.total===0?'<div style="text-align:center;color:#a16207;font-size:13px;font-weight:600;margin-top:16px;">罐子裡沒有小怪物 — 按「＋ 放一隻進去」吧!</div>':''}
        </div>
        <div style="background:#fff;border:4px dashed #1f2937;border-radius:24px;padding:24px;width:280px;flex-shrink:0;align-self:flex-start;">
          <div style="font-size:15px;font-weight:700;color:#1f2937;margin-bottom:12px;">怎麼玩?</div>
          <div style="font-size:12px;color:#78350f;font-weight:600;line-height:1.8;">點一下小怪物看看它在忙什麼!<br>按「完成」它就會開心地消失,上面的怪物會咚咚咚掉下來喔!</div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ---------- 任務詳情 Modal ---------- */
function viewModal() {
  const t = state.tasks.find(x => x.id === state.selectedId);
  if (!t) return '';
  const m = urgencyMeta[t.urgency] || urgencyMeta.green;
  const cute = state.theme === 'cute';
  const delegated = t.is_delegated
    ? `<div style="font-size:12px;color:${cute?'#7f1d1d':'#b45309'};font-weight:700;margin-bottom:14px;">🔁 代理中:${esc(t.effective_name||'')}</div>` : '';
  const inner = cute ? `
    <div class="tb-card" style="width:380px;background:#fffbeb;border:4px solid #1f2937;border-radius:28px;padding:32px;font-family:'Fredoka',Helvetica,Arial,sans-serif;">
      <div style="display:inline-block;padding:4px 12px;background:${m.color};color:#1f2937;font-size:11px;font-weight:700;border-radius:999px;border:2px solid #1f2937;margin-bottom:14px;">${m.label}</div>
      <div style="font-size:19px;font-weight:700;color:#1f2937;margin-bottom:10px;line-height:1.4;">${esc(t.title)}</div>
      <div style="font-size:13px;color:#78350f;font-weight:600;margin-bottom:18px;">截止:${fmtDue(t.due_at)}</div>
      ${delegated}
      <div style="display:flex;align-items:center;gap:10px;padding-bottom:20px;margin-bottom:20px;border-bottom:3px dashed #1f2937;">
        <div style="width:30px;height:30px;border-radius:50%;background:${esc(t.avatarColor||'#94a3b8')};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #1f2937;">${esc(t.initials||'?')}</div>
        <span style="font-size:13px;color:#1f2937;font-weight:700;">${esc(t.name||'未指派')}</span>
      </div>
      <div style="display:flex;gap:10px;">
        <button id="complete-btn" style="flex:1;padding:12px;background:#86efac;color:#14532d;font-size:13px;font-weight:700;border-radius:999px;border:2px solid #1f2937;">完成 🎉</button>
        <button id="close-btn" style="flex:1;padding:12px;background:#fff;color:#1f2937;font-size:13px;font-weight:700;border-radius:999px;border:2px solid #1f2937;">關閉</button>
      </div>
    </div>` : `
    <div class="tb-card" style="width:380px;background:#fff;border:1px solid #e2e8f0;padding:32px;">
      <div style="display:inline-block;padding:3px 10px;background:${m.bg};color:${m.color};font-size:11px;font-weight:700;margin-bottom:14px;">${m.label}</div>
      <div style="font-size:19px;font-weight:700;color:#0f172a;margin-bottom:10px;line-height:1.4;">${esc(t.title)}</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:18px;">截止:${fmtDue(t.due_at)}</div>
      ${delegated}
      <div style="display:flex;align-items:center;gap:10px;padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid #e2e8f0;">
        <div style="width:28px;height:28px;background:${esc(t.avatarColor||'#94a3b8')};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;">${esc(t.initials||'?')}</div>
        <span style="font-size:13px;color:#334155;font-weight:600;">${esc(t.name||'未指派')}</span>
      </div>
      <div style="display:flex;gap:10px;">
        <button id="complete-btn" style="flex:1;padding:11px;background:#0f172a;color:#fff;font-size:13px;font-weight:700;">完成</button>
        <button id="close-btn" style="flex:1;padding:11px;border:1px solid #cbd5e1;background:#fff;color:#334155;font-size:13px;font-weight:700;">關閉</button>
      </div>
    </div>`;
  return `<div class="tb-modal" id="task-modal" style="position:absolute;inset:0;background:rgba(15,23,42,0.55);display:flex;align-items:center;justify-content:center;z-index:50;">${inner}</div>`;
}

/* ---------- 新增任務 Modal ---------- */
function viewAddModal() {
  if (!state.showAdd) return '';
  const cute = state.theme === 'cute';
  const box = cute
    ? 'background:#fffbeb;border:4px solid #1f2937;border-radius:28px;font-family:\'Fredoka\',Helvetica,Arial,sans-serif;'
    : 'background:#fff;border:1px solid #e2e8f0;';
  const inp = cute
    ? 'width:100%;padding:10px 14px;border:3px solid #1f2937;border-radius:14px;font-size:13px;margin-bottom:12px;background:#fff;'
    : 'width:100%;padding:10px 12px;border:1px solid #cbd5e1;font-size:13px;margin-bottom:12px;background:#f8fafc;';
  return `
  <div class="tb-modal" id="add-modal" style="position:absolute;inset:0;background:rgba(15,23,42,0.55);display:flex;align-items:center;justify-content:center;z-index:60;">
    <div class="tb-card" style="width:380px;padding:32px;${box}">
      <div style="font-size:18px;font-weight:700;color:${cute?'#1f2937':'#0f172a'};margin-bottom:18px;">${cute?'放一隻小怪物進罐子':'新增任務'}</div>
      <input id="f-title" placeholder="任務標題" style="${inp}">
      <input id="f-code" placeholder="方塊短標籤(例:BUG修復)" maxlength="6" style="${inp}">
      <input id="f-due" type="datetime-local" style="${inp}">
      <select id="f-urgency" style="${inp}">
        <option value="red">緊急(紅)</option>
        <option value="yellow" selected>中(黃)</option>
        <option value="green">低(綠)</option>
      </select>
      <div style="display:flex;gap:10px;margin-top:6px;">
        <button id="save-task" style="flex:1;padding:11px;font-size:13px;font-weight:700;${cute?'background:#86efac;color:#14532d;border-radius:999px;border:2px solid #1f2937;':'background:#0f172a;color:#fff;'}">建立</button>
        <button id="cancel-task" style="flex:1;padding:11px;font-size:13px;font-weight:700;${cute?'background:#fff;color:#1f2937;border-radius:999px;border:2px solid #1f2937;':'border:1px solid #cbd5e1;background:#fff;color:#334155;'}">取消</button>
      </div>
    </div>
  </div>`;
}

/* ---------- 事件綁定 ---------- */
function bindBoard() {
  document.querySelectorAll('.block').forEach(el =>
    el.onclick = () => { state.selectedId = Number(el.dataset.id); renderModal(); });
  document.querySelectorAll('[data-uf]').forEach(el =>
    el.onclick = () => { state.filterUrgency = el.dataset.uf; render(); });
  document.querySelectorAll('[data-af]').forEach(el =>
    el.onclick = () => {
      const id = el.dataset.af;
      state.filterAssignee = (!id || state.filterAssignee === id) ? null : id;
      render();
    });
  const search = document.getElementById('search');
  if (search) search.oninput = () => { state.search = search.value; render();
    const s = document.getElementById('search'); s.focus(); s.setSelectionRange(s.value.length, s.value.length); };
  const tg = document.getElementById('theme-toggle');
  if (tg) tg.onclick = toggleTheme;
  const add = document.getElementById('add-btn');
  if (add) add.onclick = () => { state.showAdd = true; renderModal(); };
  const out = document.getElementById('signout');
  if (out) out.onclick = async () => { await db.auth.signOut(); };
  bindModal();
}
function bindModal() {
  const modal = document.getElementById('task-modal');
  if (modal) {
    modal.onclick = e => { if (e.target === modal) { state.selectedId = null; renderModal(); } };
    document.getElementById('complete-btn').onclick = () => completeTask(state.selectedId);
    document.getElementById('close-btn').onclick = () => { state.selectedId = null; renderModal(); };
  }
  const addModal = document.getElementById('add-modal');
  if (addModal) {
    addModal.onclick = e => { if (e.target === addModal) { state.showAdd = false; renderModal(); } };
    document.getElementById('cancel-task').onclick = () => { state.showAdd = false; renderModal(); };
    document.getElementById('save-task').onclick = () => {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { alert('請輸入任務標題'); return; }
      const code = document.getElementById('f-code').value.trim() || title.slice(0, 4);
      const due = document.getElementById('f-due').value;
      addTask({
        title, code,
        urgency: document.getElementById('f-urgency').value,
        due_at: due ? new Date(due).toISOString() : null,
      });
    };
  }
}

/* ---------- Realtime:別人完成任務,你的畫面同步更新 ---------- */
function subscribeRealtime() {
  db.channel('tasks-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadTasks())
    .subscribe();
}

/* ---------- 啟動 ---------- */
async function init() {
  const { data: { session } } = await db.auth.getSession();
  state.session = session;
  if (session) { await loadProfile(); await loadTasks(); subscribeRealtime(); }
  state.loading = false;
  render();
}
db.auth.onAuthStateChange(async (_event, session) => {
  const wasIn = !!state.session;
  state.session = session;
  if (session && !wasIn) { state.loading = true; render();
    await loadProfile(); await loadTasks(); subscribeRealtime(); state.loading = false; }
  if (!session) { state.tasks = []; state.profile = null; }
  render();
});
init();
</script>
</body>
</html>
